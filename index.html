    /* =============================================================
       THEME — 色を変えるときはここだけ編集（記事側は articles/style.css）
       ============================================================= */
    :root {
      --bg: #ffffff; --surface: #f5f7fc; --surface2: #eef0f8;
      --border: #dde1ee; --accent: #2563eb; --accent2: #6d28d9;
      --text: #1e2130; --muted: #64748b;
      --green: #16a34a; --yellow: #d97706; --red: #dc2626;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* HEADER */
    header { background: var(--bg); border-bottom: 1px solid var(--border); padding: 22px 20px 18px; text-align: center; }
    .header-inner { max-width: 1400px; margin: 0 auto; }
    header h1 { font-size: clamp(1.25rem,3vw,1.8rem); font-weight: 650; color: var(--text); margin-bottom: 6px; letter-spacing: 0; }
    header p { color: var(--muted); font-size: .86rem; }
    .stat-bar { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .stat-chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 14px; font-size: .78rem; color: var(--muted); }
    .stat-chip span { color: var(--accent); font-weight: 600; }

    /* CONTROLS */
    .controls { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 12px 16px; }
    .controls-inner { max-width: 1400px; margin: 0 auto; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    #search { flex: 1; min-width: 200px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; color: var(--text); font-size: .9rem; outline: none; transition: border-color .2s; }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--muted); }
    .filter-select { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 34px 8px 12px; font-size: .82rem; color: var(--text); cursor: pointer; outline: none; min-width: 170px; }
    .filter-select:focus { border-color: var(--accent); }
    .star-filter { display: flex; gap: 4px; }
    .star-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; font-size: .78rem; color: var(--muted); cursor: pointer; transition: all .2s; }
    .star-btn:hover, .star-btn.active { background: var(--yellow); border-color: var(--yellow); color: #111; }
    .sort-filter { display: flex; gap: 4px; }
    .sort-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; font-size: .78rem; color: var(--muted); cursor: pointer; transition: all .2s; white-space: nowrap; }
    .sort-btn:hover, .sort-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    #result-count { color: var(--muted); font-size: .8rem; margin-left: auto; }

    /* MAIN */
    main { max-width: 1400px; margin: 0 auto; padding: 20px 16px; }

    /* SECTION */
    .section-header { display: flex; align-items: center; gap: 10px; margin: 28px 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .section-header h2 { font-size: 1rem; font-weight: 600; }
    .section-count { background: var(--surface2); border-radius: 12px; padding: 2px 8px; font-size: .72rem; color: var(--muted); margin-left: auto; }

    /* CARDS GRID */
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }

    /* CARD */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; transition: transform .15s, border-color .15s, box-shadow .15s; }
    .card:hover { transform: translateY(-2px); border-color: var(--accent); box-shadow: 0 4px 24px rgba(79,142,247,.12); }
    .card.hidden { display: none; }

    /* CARD IMAGE */
    .card-img { height: 140px; position: relative; overflow: hidden; background: var(--grad, linear-gradient(135deg,#dde6f5,#c8d4ef)); flex-shrink: 0; }
    .card-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-img .img-fallback { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 2.2rem; opacity: .7; gap: 6px; }
    .card-img .img-fallback span { font-size: .72rem; color: rgba(255,255,255,.5); font-weight: 500; letter-spacing: .05em; }
    .card-img .num-badge { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,.6); backdrop-filter: blur(4px); border-radius: 6px; padding: 2px 8px; font-size: .7rem; color: rgba(255,255,255,.8); }

    /* CARD BODY */
    .card-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
    .card-title a { font-size: .87rem; font-weight: 600; line-height: 1.4; color: var(--text); text-decoration: none; transition: color .15s; }
    .card-title a:hover { color: var(--accent); }
    .card-meta { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag { border-radius: 4px; padding: 2px 7px; font-size: .68rem; }
    .tag.cat { background: rgba(124,106,247,.12); border: 1px solid rgba(124,106,247,.25); color: var(--accent2); }
    .tag.year { background: rgba(76,175,130,.12); border: 1px solid rgba(76,175,130,.25); color: var(--green); }
    .tag.rating { background: rgba(217,119,6,.12); border: 1px solid rgba(217,119,6,.25); color: var(--yellow); letter-spacing: .04em; }
    .card-desc { font-size: .76rem; color: var(--muted); line-height: 1.55; flex: 1; }
    .orig-link { font-size: .65rem; color: var(--muted); margin-left: 6px; text-decoration: none; vertical-align: middle; }
    .orig-link:hover { color: var(--accent); }

    /* TABS */
    .tabs { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; justify-content: center; }
    .tab-btn { padding: 13px 40px; font-size: .92rem; font-weight: 600; color: var(--muted); cursor: pointer; border: none; background: none; border-bottom: 3px solid transparent; transition: all .2s; }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* EMPTY */
    #empty { display: none; text-align: center; padding: 60px 20px; color: var(--muted); }
    #empty .emoji { font-size: 3rem; margin-bottom: 12px; }

    /* FOOTER */
    footer { text-align: center; padding: 24px; color: var(--muted); font-size: .78rem; border-top: 1px solid var(--border); margin-top: 40px; }
    footer a { color: var(--accent); text-decoration: none; }

    @media (max-width: 600px) {
      .cards { grid-template-columns: 1fr; }
      .controls { padding: 10px 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .controls-inner { width: max-content; min-width: 100%; flex-wrap: nowrap; align-items: center; }
      #search { flex: 0 0 210px; min-width: 210px; }
      .filter-select { flex: 0 0 auto; min-width: 150px; }
      .star-filter, .sort-filter { flex: 0 0 auto; }
      .star-btn, .sort-btn { flex: 0 0 auto; }
      #result-count { flex: 0 0 auto; margin-left: 4px; white-space: nowrap; }
    }
  </style>
</head>

// ─── ARTICLE TYPE ────────────────────────────────────────────────────────────
const PAPER_URL_PATTERNS = [
  'arxiv.org', 'openaccess.thecvf.com', 'dl.acm.org',
  'link.springer.com', 'tandfonline.com', 'frontiersin.org', 'sciencedirect.com'
];
const PAPER_NUMS = new Set([47, 52, 93]); // GitHub repos that host academic papers

function getArticleType(a) {
  if (PAPER_URL_PATTERNS.some(p => a.url.includes(p))) return 'paper';
  if (PAPER_NUMS.has(a.num)) return 'paper';
  return 'article';
}

// ─── CATEGORY META ────────────────────────────────────────────────────────────
const CAT_META = {
  waymo:      { label:"Waymo",        emoji:"🚗", grad:"linear-gradient(135deg,#0a2060,#1d50c8)" },
  tesla:      { label:"Tesla",        emoji:"⚡", grad:"linear-gradient(135deg,#5a0000,#cc2020)" },
  wayve:      { label:"Wayve",        emoji:"🌊", grad:"linear-gradient(135deg,#003322,#00875a)" },
  aurora:     { label:"Aurora",       emoji:"🌌", grad:"linear-gradient(135deg,#0d0d30,#3a3a90)" },
  nvidia:     { label:"NVIDIA",       emoji:"💡", grad:"linear-gradient(135deg,#003300,#5a9a00)" },
  ai:         { label:"AI/ML",        emoji:"🤖", grad:"linear-gradient(135deg,#160828,#5a3aae)" },
  sim:        { label:"シミュレーション",emoji:"🖥️", grad:"linear-gradient(135deg,#002e2e,#1aa8a8)" },
  sensor:     { label:"センサー",      emoji:"📡", grad:"linear-gradient(135deg,#2e1800,#c06000)" },
  chip:       { label:"チップ",        emoji:"🔧", grad:"linear-gradient(135deg,#101020,#3a3acc)" },
  architecture:{ label:"Architecture", emoji:"🏗️", grad:"linear-gradient(135deg,#15311f,#3f7d4a)" },
  regulation: { label:"規制/動向",     emoji:"🌐", grad:"linear-gradient(135deg,#101830,#305878)" },
  default:    { label:"記事",          emoji:"📄", grad:"linear-gradient(135deg,#dde6f5,#c8d4ef)" },
};

function getCatMeta(catStr) {
  const cats = (catStr||'').split(' ');
  for (const c of cats) {
    if (CAT_META[c]) return { key: c, ...CAT_META[c] };
  }
  return { key:'default', ...CAT_META.default };
}

const FIRST_PASS_ORDER = [

  104, 20,
  105,
  107,
  108, 109, 110,
  102, 103,
  101, 10,
  34, 113,
  111, 112, 114,

const FULL_READING_ORDER = [
  1, 6, 5, 8, 81, 100, 98, 7, 4, 3, 2, 9,
  104, 18, 20, 19, 83, 82,
  30, 31,
  21, 22,
  23, 24, 25,

const READING_ORDER = FIRST_PASS_ORDER.concat(
  FULL_READING_ORDER.filter(num => !FIRST_PASS_ORDER.includes(num))
);
const READING_RANK = new Map(READING_ORDER.map((num, i) => [num, i + 1]));

const PRIORITY_SECTIONS = [
  { id:"first-pass", title:"最初の一巡（20本）", filter: a => FIRST_PASS_ORDER.includes(a.num), order: FIRST_PASS_ORDER },
  { id:"deep-dive", title:"次に読む（残り94本）", filter: a => READING_RANK.has(a.num), order: READING_ORDER },
];

function getSections(sortMode) {
  if (sortMode === 'num') {
    return [
      { id:"num-order", title:"記事番号順", filter: () => true, order: ARTICLES.map(a => a.num).sort((a, b) => a - b) },
    ];
  }
  return PRIORITY_SECTIONS;
}

let activeCat = 'all', activeStars = 0, activeTab = 'all', activeSort = 'priority';

// ─── RENDER ──────────────────────────────────────────────────────────────────
function renderCard(a) {
  const meta = getCatMeta(a.cat);
  const hasImg = !!a.img;
  const localUrl = LOCAL_ARTICLES[a.num];
  const rank = READING_RANK.get(a.num);
  const badgeText = activeSort === 'priority' && rank ? `${rank}. #${a.num}` : `#${a.num}`;
  const imgInner = hasImg
    ? `<img src="${a.img}" loading="lazy" alt="" onerror="this.style.display='none'">`
    : `<div class="img-fallback">${meta.emoji}<span>${meta.label}</span></div>`;

  return `
  <div class="card"
       data-cat="${a.cat}"
       data-stars="${a.stars}"
       data-year="${a.year}"
       data-num="${a.num}"
       data-type="${getArticleType(a)}"
       data-text="${(a.title + ' ' + a.desc).toLowerCase()}">
    <div class="card-img" style="background:${a.img ? '#000' : meta.grad}">
      ${imgInner}
      <div class="num-badge">${badgeText}</div>
    </div>
    <div class="card-body">
      <div class="card-title"><a href="${localUrl || a.url}" ${localUrl ? '' : 'target="_blank" rel="noopener"'}>${a.title}</a>${localUrl ? `<a href="${a.url}" target="_blank" rel="noopener" class="orig-link" title="原文(英語)を開く">↗原文</a>` : ''}</div>
      <div class="card-meta">
        <span class="tag cat">${meta.emoji} ${meta.label}</span>
        <span class="tag year">${a.year}</span>
        <span class="tag rating">${'⭐'.repeat(a.stars)}</span>
      </div>
      <div class="card-desc">${a.desc}</div>
    </div>
  </div>`;
}

function buildSections() {
  const main = document.getElementById('main');
  main.innerHTML = '';
  const rendered = new Set();

  for (const sec of getSections(activeSort)) {
    let articles = ARTICLES.filter(a => sec.filter(a) && !rendered.has(a.num));
    if (sec.order) {
      const rank = new Map(sec.order.map((num, i) => [num, i]));
      articles = articles.sort((a, b) => rank.get(a.num) - rank.get(b.num));
    }
    if (articles.length === 0) continue;
    articles.forEach(a => rendered.add(a.num));

    const secEl = document.createElement('div');
    secEl.dataset.section = sec.id;

    secEl.innerHTML = `
      <div class="section-header">
        <h2>${sec.title}</h2>
        <span class="section-count">${articles.length}件</span>
      </div>
      <div class="cards">${articles.map(renderCard).join('')}</div>`;
    main.appendChild(secEl);
  }
}

buildSections();
// Apply initial tab filter (show articles by default)
// Called after filter logic is defined below — moved to end of script

// ─── FILTER & SEARCH ─────────────────────────────────────────────────────────
function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  let visible = 0;

  document.querySelectorAll('.card').forEach(card => {
    const cats = card.dataset.cat || '';
    const stars = parseInt(card.dataset.stars) || 0;
    const text = card.dataset.text || '';
    const type = card.dataset.type || 'article';

    const catOK = activeCat === 'all' || cats.split(' ').includes(activeCat);
    const starOK = activeStars === 0 || stars >= activeStars;
    const searchOK = !q || text.includes(q);
    const tabOK = activeTab === 'all' || type === activeTab;

    const show = catOK && starOK && searchOK && tabOK;
    card.classList.toggle('hidden', !show);
    if (show) visible++;
  });

  document.getElementById('result-count').textContent = visible + '件';
  document.getElementById('empty').style.display = visible === 0 ? 'block' : 'none';

  // Hide sections with no visible cards
  document.querySelectorAll('[data-section]').forEach(sec => {
    const anyVisible = sec.querySelector('.card:not(.hidden)');
    sec.style.display = anyVisible ? '' : 'none';
  });
}

document.getElementById('search').addEventListener('input', applyFilters);

document.getElementById('cat-filter').addEventListener('change', e => {
  activeCat = e.target.value;
  applyFilters();
});

document.querySelectorAll('.star-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.star-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeStars = parseInt(btn.dataset.stars);
    applyFilters();
  });
});

document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeSort = btn.dataset.sort;
    buildSections();
    applyFilters();
  });
});

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTab = btn.dataset.tab;
    // Reset category filter when switching tabs
    activeCat = 'all';
    document.getElementById('cat-filter').value = 'all';
    applyFilters();
  });
});

// Initial render: apply tab filter (articles tab is default)
applyFilters();
</script>
