function getUserRating(num) {
  return parseInt(localStorage.getItem('ur_' + num) || '0');
}
function setUserRating(num, val) {
  localStorage.setItem('ur_' + num, val);
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function starsHTML(n) {
  return '⭐'.repeat(n) + (n < 5 ? '☆'.repeat(5-n) : '');
}

function renderCard(a) {
  const meta = getCatMeta(a.cat);
  const userRating = getUserRating(a.num);
  const hasImg = !!a.img;
  const imgInner = hasImg
    ? `<img src="${a.img}" loading="lazy" alt="" onerror="this.style.display='none'">`
    : `<div class="img-fallback">${meta.emoji}<span>${meta.label}</span></div>`;

  return `
  <div class="card"
       data-cat="${a.cat}"
       data-stars="${a.stars}"
       data-year="${a.year}"
       data-num="${a.num}"
       data-type="${getArticleType(a)}"
       data-text="${(a.title + ' ' + a.desc).toLowerCase()}">
    <div class="card-img" style="background:${a.img ? '#000' : meta.grad}">
      ${imgInner}
      <div class="num-badge">#${a.num}</div>
    </div>
    <div class="card-body">
      <div class="card-title"><a href="${a.url}" target="_blank" rel="noopener">${a.title}</a></div>
      <div class="card-meta">
        <span class="tag cat">${meta.emoji} ${meta.label}</span>
        <span class="tag year">${a.year}</span>
      </div>
      <div class="card-desc">${a.desc}</div>
      <div class="card-ratings">
        <div class="rating-row">
          <span class="rating-label">編集部</span>
          <span class="editor-stars">${'⭐'.repeat(a.stars)}</span>
        </div>
        <div class="rating-row">
          <span class="rating-label">マイ評価</span>
          <div class="user-stars" data-num="${a.num}">
            ${[1,2,3,4,5].map(v =>
              `<span class="s${userRating >= v ? ' lit' : ''}" data-val="${v}">★</span>`
            ).join('')}
          </div>
          ${userRating === 0 ? `<span class="user-note">クリックして評価</span>` : ''}
        </div>
      </div>
    </div>
  </div>`;
}

function buildSections() {
  const main = document.getElementById('main');
  main.innerHTML = '';

  for (const sec of SECTIONS) {
    const articles = ARTICLES.filter(sec.filter);
    if (articles.length === 0) continue;

    const secEl = document.createElement('div');
    secEl.dataset.section = sec.id;

    secEl.innerHTML = `
      <div class="section-header">
        <h2>${sec.title}</h2>
        <span class="section-count">${articles.length}件</span>
      </div>
      <div class="cards">${articles.map(renderCard).join('')}</div>`;
    main.appendChild(secEl);
  }
}

buildSections();

// ─── FILTER & SEARCH ─────────────────────────────────────────────────────────
let activeCat = 'all', activeStars = 0, activeTab = 'article';

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  let visible = 0;

  document.querySelectorAll('.card').forEach(card => {
    const cats = card.dataset.cat || '';
    const stars = parseInt(card.dataset.stars) || 0;
    const text = card.dataset.text || '';
    const type = card.dataset.type || 'article';

    const catOK = activeCat === 'all' || cats.split(' ').includes(activeCat);
    const starOK = activeStars === 0 || stars >= activeStars;
    const searchOK = !q || text.includes(q);
    const tabOK = type === activeTab;

    const show = catOK && starOK && searchOK && tabOK;
    card.classList.toggle('hidden', !show);
    if (show) visible++;
  });

  document.getElementById('result-count').textContent = visible + '件';
  document.getElementById('empty').style.display = visible === 0 ? 'block' : 'none';

  // Hide sections with no visible cards
  document.querySelectorAll('[data-section]').forEach(sec => {
    const anyVisible = sec.querySelector('.card:not(.hidden)');
    sec.style.display = anyVisible ? '' : 'none';
  });
}

document.getElementById('search').addEventListener('input', applyFilters);

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCat = btn.dataset.cat;
    applyFilters();
  });
});

document.querySelectorAll('.star-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.star-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeStars = parseInt(btn.dataset.stars);
    applyFilters();
  });
});

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTab = btn.dataset.tab;
    // Reset category filter when switching tabs
    activeCat = 'all';
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.filter-btn[data-cat="all"]').classList.add('active');
    applyFilters();
  });
});

// ─── USER RATINGS ─────────────────────────────────────────────────────────────
document.addEventListener('mouseover', e => {
  const s = e.target.closest('.s');
  if (!s) return;
  const group = s.closest('.user-stars');
  const val = parseInt(s.dataset.val);
  group.querySelectorAll('.s').forEach(star => {
    star.classList.toggle('hover-lit', parseInt(star.dataset.val) <= val);
  });
});

document.addEventListener('mouseout', e => {
  const s = e.target.closest('.s');
  if (!s) return;
  const group = s.closest('.user-stars');
  const num = parseInt(group.dataset.num);
  const saved = getUserRating(num);
  group.querySelectorAll('.s').forEach(star => {
    star.classList.remove('hover-lit');
    star.classList.toggle('lit', parseInt(star.dataset.val) <= saved);
  });
});

document.addEventListener('click', e => {
  const s = e.target.closest('.s');
  if (!s) return;
  const group = s.closest('.user-stars');
  const num = parseInt(group.dataset.num);
  const val = parseInt(s.dataset.val);
  // Toggle off if clicking same rating
  const prev = getUserRating(num);
  const newVal = prev === val ? 0 : val;
  setUserRating(num, newVal);

  group.querySelectorAll('.s').forEach(star => {
    star.classList.toggle('lit', parseInt(star.dataset.val) <= newVal);
  });

  // Update note
  const row = group.closest('.rating-row');
  let note = row.querySelector('.user-note');
  if (newVal === 0) {
    if (!note) { note = document.createElement('span'); note.className = 'user-note'; row.appendChild(note); }
    note.textContent = 'クリックして評価';
  } else {
    if (note) note.remove();
  }
});

// Initial render: apply tab filter (articles tab is default)
applyFilters();
</script>
</body>
</html>
